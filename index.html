<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Hackerspace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at top, #020617, #000000 80%);
            color: #22c55e;
            font-family: 'Courier New', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 12px;
            background: rgba(2, 6, 23, 0.85);
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.2);
            backdrop-filter: blur(8px);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #22c55e, 0 0 20px #22c55e;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #4ade80;
            margin-bottom: 25px;
            opacity: 0.8;
        }

        .menu {
            display: grid;
            grid-template-columns: repeat(2, 200px);
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 15px;
            background: transparent;
            border: 1px solid #22c55e;
            color: #22c55e;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            border-radius: 6px;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: #22c55e;
            opacity: 0;
            transition: 0.3s;
            z-index: 0;
        }

        button:hover::before {
            opacity: 0.1;
        }

        button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 0 15px #22c55e;
        }

        button span {
            position: relative;
            z-index: 1;
        }

        /* efeito de scan */
        .scanline {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(34, 197, 94, 0.1);
            animation: scan 5s linear infinite;
        }

        .footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            color: rgba(34, 197, 94, 0.5);
            letter-spacing: 1px;
        }

        @keyframes scan {
            0% {
                top: 0;
            }

            100% {
                top: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="scanline"></div>

    <div class="container">
        <h1>> HACKERSPACE</h1>
        <div class="subtitle">Selecione um desafio para iniciar a missão</div>

        <div class="menu">
            <button onclick="start('crudphp')">
                <h1>
                    <i class="fa-solid fa-database"></i>
                </h1>
                <span>CRUD PHP</span>
            </button>
            <button onclick="start('php')">
                 <h1>
                    <i class="fa-brands fa-php"></i>
                </h1>
                <span>PHP</span>
            </button>
            <button onclick="start('python')">
                <h1>
                    <i class="fa-brands fa-python"></i>
                </h1>
                <span>Python</span>
            </button>
            <button onclick="start('portugol')">
                <h1>
                    <i class="fa-solid fa-code"></i>
                </h1>
                <span>Portugol</span>
            </button>
        </div>
    </div>

    <script>
        function start(tipo) {
            localStorage.setItem('desafio', tipo);
            window.location.href = 'boot.html';
        }
    </script>

    <div class="footer">desenvolvido por Joran</div>

</body>

</html>
